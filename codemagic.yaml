workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Set Android SDK permissions
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug --quiet || ./gradlew assembleDebug --stacktrace | grep -A 10 "Caused by:"
    artifacts:
      - app/build/outputs/**/*.apk
